<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Riservata — Torre & Partners</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <h1>Torre & Partners</h1>
                <p class="login-subtitle">Area Riservata Condomini</p>
            </div>

            <div id="errore" class="alert alert-error" style="display:none;"></div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Il tuo username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="La tua password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Accedi</button>
            </form>

            <div class="login-footer">
                <a href="https://www.torreandpartners.it" class="back-link">&larr; Torna al sito</a>
            </div>
        </div>
    </div>

    <script>
    const supabase = supabaseJs.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const erroreDiv = document.getElementById('errore');
        
        if (!username || !password) {
            erroreDiv.textContent = 'Inserisci username e password.';
            erroreDiv.style.display = 'block';
            return;
        }

        try {
            const { data, error } = await supabase
                .from('utenti')
                .select('*')
                .eq('username', username)
                .eq('password', password)
                .single();

            if (error || !data) {
                erroreDiv.textContent = 'Username o password non validi.';
                erroreDiv.style.display = 'block';
                return;
            }

            // Salva sessione
            sessionStorage.setItem('utente', JSON.stringify(data));
            
            if (data.ruolo === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        } catch (err) {
            erroreDiv.textContent = 'Errore del server. Riprova.';
            erroreDiv.style.display = 'block';
        }
    });
    </script>
</body>
</html>
