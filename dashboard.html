<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Area Riservata</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="topbar-left">
                <strong>Torre & Partners</strong>
                <span class="topbar-sep">|</span>
                <span>Area Riservata</span>
            </div>
            <div class="topbar-right">
                <span class="topbar-user" id="nomeUtente"></span>
                <a href="admin.html" id="btnAdmin" class="btn btn-small btn-admin" style="display:none;">Gestione</a>
                <a href="#" id="btnLogout" class="btn btn-small btn-logout">Esci</a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="welcome-card" id="welcomeCard">
            <h2 id="benvenuto">Benvenuto</h2>
            <p class="welcome-sub" id="condominio"></p>
            <p>Qui puoi consultare e scaricare i documenti del tuo condominio.</p>
        </div>
        <div class="documents-section">
            <h3>I tuoi documenti</h3>
            <div id="listaDocumenti"></div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2025 Torre & Partners &mdash; Tutti i diritti riservati</p>
        <p><a href="https://www.torreandpartners.it">torreandpartners.it</a></p>
    </footer>

    <script>
    const utente = JSON.parse(sessionStorage.getItem('utente'));
    if (!utente) window.location.href = 'index.html';

    document.getElementById('nomeUtente').textContent = utente.nome_condomino;
    document.getElementById('benvenuto').textContent = 'Benvenuto, ' + utente.nome_condomino;
    document.getElementById('condominio').textContent = 'Condominio ' + utente.nome_condominio;

    if (utente.ruolo === 'admin') {
        document.getElementById('btnAdmin').style.display = 'inline-block';
    }

    document.getElementById('btnLogout').addEventListener('click', function(e) {
        e.preventDefault();
        sessionStorage.removeItem('utente');
        window.location.href = 'index.html';
    });

    async function caricaDocumenti() {
        const container = document.getElementById('listaDocumenti');
        
        try {
            let { data, error } = await supabaseQuery('documenti', {
                filtri: utente.ruolo !== 'admin' ? { utente_id: utente.id } : {},
                order: 'created_at.desc'
            });

            if (error) throw error;

            if (!data || data.length === 0) {
                container.innerHTML = '<div class="alert alert-info"><p>Nessun documento disponibile al momento.</p></div>';
                return;
            }

            let html = '<div class="documents-grid">';
            
            for (const doc of data) {
                let nomeCond = '';
                if (utente.ruolo === 'admin') {
                    const { data: userData } = await supabaseQuery('utenti', {
                        filtri: { id: doc.utente_id },
                        select: 'nome_condomino',
                        single: true
                    });
                    nomeCond = userData ? userData.nome_condomino : '';
                }

                const urlPub = supabasePublicUrl(CONFIG.BUCKET_NAME, doc.nome_file);
                
                html += `
                    <div class="doc-card">
                        <div class="doc-icon">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#c49c60" stroke-width="1.5">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                            </svg>
                        </div>
                        <div class="doc-info">
                            <h4>${doc.nome_originale}</h4>
                            ${doc.descrizione ? `<p class="doc-desc">${doc.descrizione}</p>` : ''}
                            <p class="doc-meta">
                                ${new Date(doc.created_at).toLocaleDateString('it-IT')}
                                ${nomeCond ? ' &mdash; ' + nomeCond : ''}
                                ${doc.dimensione ? ' &mdash; ' + formattaDimensione(doc.dimensione) : ''}
                            </p>
                        </div>
                        <a href="${urlPub}" target="_blank" class="btn btn-download">Scarica</a>
                    </div>
                `;
            }
            
            html += '</div>';
            container.innerHTML = html;
        } catch (err) {
            container.innerHTML = '<div class="alert alert-error">Errore nel caricamento dei documenti.</div>';
        }
    }

    function formattaDimensione(bytes) {
        if (!bytes) return '';
        if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
        if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return bytes + ' B';
    }

    caricaDocumenti();
    </script>
</body>
</html>
