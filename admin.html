<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione — Torre & Partners</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="topbar-left">
                <strong>Torre & Partners</strong>
                <span class="topbar-sep">|</span>
                <span>Pannello di Gestione</span>
            </div>
            <div class="topbar-right">
                <span class="topbar-user">Admin</span>
                <a href="dashboard.html" class="btn btn-small btn-admin">Vista Utente</a>
                <a href="#" id="btnLogout" class="btn btn-small btn-logout">Esci</a>
            </div>
        </div>
    </header>

    <main class="main-content admin-page">
        <div id="messaggio" class="alert alert-success" style="display:none;"></div>
        <div id="errore" class="alert alert-error" style="display:none;"></div>

        <div class="admin-grid">
            <!-- Colonna sinistra: Nuovo Utente + Cambia Password -->
            <div class="admin-col">
                <!-- Nuovo Utente -->
                <div class="admin-card">
                    <h3>&#10133; Nuovo Condomino</h3>
                    <form id="formUtente" class="admin-form">
                        <div class="form-group">
                            <label>Username (per il login)</label>
                            <input type="text" id="nuovoUsername" placeholder="es. mario.rossi" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="text" id="nuovaPassword" placeholder="Scegli una password" required>
                        </div>
                        <div class="form-group">
                            <label>Nome e Cognome</label>
                            <input type="text" id="nuovoNome" placeholder="es. Mario Rossi" required>
                        </div>
                        <div class="form-group">
                            <label>Condominio</label>
                            <input type="text" id="nuovoCondominio" placeholder="es. La Castellana" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Crea Utente</button>
                    </form>
                </div>

                <!-- Cambia Password Admin -->
                <div class="admin-card">
                    <h3>&#128273; Cambia Password Admin</h3>
                    <form id="formPassword" class="admin-form">
                        <div class="form-group">
                            <label>Nuova password</label>
                            <input type="text" id="adminPassword" placeholder="Inserisci nuova password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Aggiorna Password</button>
                    </form>
                </div>
            </div>

            <!-- Colonna destra: Carica Documento -->
            <div class="admin-col">
                <div class="admin-card">
                    <h3>&#128196; Carica Documento</h3>
                    <form id="formCarica" class="admin-form">
                        <div class="form-group">
                            <label>Condomino destinatario</label>
                            <select id="selectUtente" required>
                                <option value="">&mdash; Seleziona &mdash;</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>File PDF</label>
                            <input type="file" id="fileInput" accept=".pdf" required>
                        </div>
                        <div class="form-group">
                            <label>Descrizione (opzionale)</label>
                            <input type="text" id="descrizioneFile" placeholder="es. Bilancio 2024, Verbale assemblea...">
                        </div>
                        <button type="submit" class="btn btn-primary" id="btnCarica">Carica PDF</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Tabella Utenti -->
        <div class="admin-card users-table-card">
            <h3>&#128203; Condomini registrati</h3>
            <div class="table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Condomino</th>
                            <th>Condominio</th>
                            <th>Username</th>
                            <th>Documenti</th>
                            <th>Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="tabellaUtenti"></tbody>
                </table>
            </div>
        </div>

        <!-- Documenti di un utente specifico -->
        <div id="sezioneDocumentiUtente" style="display:none;">
            <div class="admin-card">
                <h3 id="titoloDocumentiUtente"></h3>
                <div class="table-wrapper">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>File</th>
                                <th>Descrizione</th>
                                <th>Caricato il</th>
                                <th>Dimensione</th>
                                <th>Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="tabellaDocumentiUtente"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
    const supabase = supabaseJs.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

    // Controlla se admin
    const utente = JSON.parse(sessionStorage.getItem('utente'));
    if (!utente || utente.ruolo !== 'admin') window.location.href = 'index.html';

    document.getElementById('btnLogout').addEventListener('click', function(e) {
        e.preventDefault();
        sessionStorage.removeItem('utente');
        window.location.href = 'index.html';
    });

    function mostraMessaggio(msg) {
        const div = document.getElementById('messaggio');
        div.textContent = msg;
        div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 4000);
    }

    function mostraErrore(msg) {
        const div = document.getElementById('errore');
        div.textContent = msg;
        div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 4000);
    }

    // === CREA UTENTE ===
    document.getElementById('formUtente').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = document.getElementById('nuovoUsername').value.trim();
        const password = document.getElementById('nuovaPassword').value;
        const nome = document.getElementById('nuovoNome').value.trim();
        const condominio = document.getElementById('nuovoCondominio').value.trim();

        if (!username || !password || !nome || !condominio) {
            mostraErrore('Compila tutti i campi.');
            return;
        }

        try {
            const { error } = await supabase.from('utenti').insert({
                username: username,
                password: password,
                nome_condomino: nome,
                nome_condominio: condominio,
                ruolo: 'utente'
            });

            if (error) {
                if (error.code === '23505') mostraErrore('Username già esistente.');
                else mostraErrore('Errore: ' + error.message);
                return;
            }

            mostraMessaggio('Utente "' + nome + '" creato con successo!');
            document.getElementById('formUtente').reset();
            caricaUtenti();
        } catch (err) {
            mostraErrore('Errore del server.');
        }
    });

    // === CAMBIA PASSWORD ADMIN ===
    document.getElementById('formPassword').addEventListener('submit', async function(e) {
        e.preventDefault();
        const nuovaPassword = document.getElementById('adminPassword').value;
        
        if (nuovaPassword.length < 4) {
            mostraErrore('La password deve essere almeno 4 caratteri.');
            return;
        }

        try {
            const { error } = await supabase.from('utenti')
                .update({ password: nuovaPassword })
                .eq('id', utente.id);

            if (error) {
                mostraErrore('Errore: ' + error.message);
                return;
            }

            mostraMessaggio('Password admin cambiata con successo!');
            document.getElementById('formPassword').reset();
        } catch (err) {
            mostraErrore('Errore del server.');
        }
    });

    // === CARICA DOCUMENTO ===
    document.getElementById('formCarica').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const utenteId = document.getElementById('selectUtente').value;
        const descrizione = document.getElementById('descrizioneFile').value.trim();
        const fileInput = document.getElementById('fileInput');
        const btn = document.getElementById('btnCarica');

        if (!utenteId || !fileInput.files[0]) {
            mostraErrore('Seleziona un utente e un file.');
            return;
        }

        const file = fileInput.files[0];
        if (file.type !== 'application/pdf') {
            mostraErrore('Solo file PDF sono accettati.');
            return;
        }
        if (file.size > 10 * 1024 * 1024) {
            mostraErrore('Il file è troppo grande (max 10 MB).');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Caricamento...';

        try {
            // Nome univoco
            const nomeUnivoco = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            
            // Upload su Storage
            const { error: uploadError } = await supabase.storage
                .from(CONFIG.BUCKET_NAME)
                .upload(nomeUnivoco, file, {
                    contentType: 'application/pdf'
                });

            if (uploadError) {
                mostraErrore('Errore upload: ' + uploadError.message);
                btn.disabled = false;
                btn.textContent = 'Carica PDF';
                return;
            }

            // Salva riferimento nel database
            const { error: dbError } = await supabase.from('documenti').insert({
                utente_id: parseInt(utenteId),
                nome_file: nomeUnivoco,
                nome_originale: file.name,
                descrizione: descrizione || null,
                dimensione: file.size
            });

            if (dbError) {
                mostraErrore('Errore database: ' + dbError.message);
                btn.disabled = false;
                btn.textContent = 'Carica PDF';
                return;
            }

            mostraMessaggio('Documento caricato con successo!');
            document.getElementById('formCarica').reset();
            caricaUtenti();
        } catch (err) {
            mostraErrore('Errore durante il caricamento.');
        }

        btn.disabled = false;
        btn.textContent = 'Carica PDF';
    });

    // === CARICA UTENTI ===
    async function caricaUtenti() {
        const { data, error } = await supabase.from('utenti')
            .select('*')
            .order('nome_condominio')
            .order('nome_condomino');

        if (error) return;

        const tbody = document.getElementById('tabellaUtenti');
        const select = document.getElementById('selectUtente');

        // Aggiorna tabella
        let html = '';
        let options = '<option value="">&mdash; Seleziona &mdash;</option>';

        for (const u of data) {
            const { count } = await supabase.from('documenti')
                .select('*', { count: 'exact', head: true })
                .eq('utente_id', u.id);

            const numDoc = count || 0;

            html += '<tr>';
            html += '<td><strong>' + u.nome_condomino + '</strong></td>';
            html += '<td>' + u.nome_condominio + '</td>';
            html += '<td><code>' + u.username + '</code></td>';
            html += '<td><a href="#" class="link-doc-count" data-id="' + u.id + '" data-nome="' + u.nome_condomino + '">' + numDoc + ' documenti</a></td>';
            html += '<td>';
            if (u.ruolo !== 'admin') {
                html += '<button class="btn btn-small btn-danger" onclick="eliminaUtente(' + u.id + ')">Elimina</button>';
            } else {
                html += '<span class="badge-admin">Admin</span>';
            }
            html += '</td></tr>';

            options += '<option value="' + u.id + '">' + u.nome_condomino + ' &mdash; ' + u.nome_condominio + '</option>';
        }

        tbody.innerHTML = html;
        select.innerHTML = options;

        // Click sul conteggio documenti
        document.querySelectorAll('.link-doc-count').forEach(el => {
            el.addEventListener('click', function(e) {
                e.preventDefault();
                const id = this.dataset.id;
                const nome = this.dataset.nome;
                caricaDocumentiUtente(id, nome);
            });
        });
    }

    // === ELIMINA UTENTE ===
    async function eliminaUtente(id) {
        if (!confirm('Eliminare questo utente e tutti i suoi documenti?')) return;

        try {
            // Prendi i documenti per eliminarli dallo storage
            const { data: docs } = await supabase.from('documenti')
                .select('nome_file')
                .eq('utente_id', id);

            if (docs && docs.length > 0) {
                const files = docs.map(d => d.nome_file);
                await supabase.storage.from(CONFIG.BUCKET_NAME).remove(files);
            }

            await supabase.from('documenti').delete().eq('utente_id', id);
            await supabase.from('utenti').delete().eq('id', id);

            mostraMessaggio('Utente eliminato.');
            caricaUtenti();
        } catch (err) {
            mostraErrore('Errore durante l\'eliminazione.');
        }
    }

    // === CARICA DOCUMENTI DI UN UTENTE ===
    async function caricaDocumentiUtente(id, nome) {
        document.getElementById('sezioneDocumentiUtente').style.display = 'block';
        document.getElementById('titoloDocumentiUtente').textContent = 'Documenti di ' + nome;

        const { data, error } = await supabase.from('documenti')
            .select('*')
            .eq('utente_id', id)
            .order('created_at', { ascending: false });

        const tbody = document.getElementById('tabellaDocumentiUtente');
        
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#666;">Nessun documento.</td></tr>';
            return;
        }

        let html = '';
        for (const doc of data) {
            const urlPub = supabase.storage.from(CONFIG.BUCKET_NAME).getPublicUrl(doc.nome_file).data.publicUrl;
            html += '<tr>';
            html += '<td>' + doc.nome_originale + '</td>';
            html += '<td>' + (doc.descrizione || '-') + '</td>';
            html += '<td>' + new Date(doc.created_at).toLocaleDateString('it-IT') + '</td>';
            html += '<td>' + formattaDimensione(doc.dimensione) + '</td>';
            html += '<td>';
            html += '<a href="' + urlPub + '" target="_blank" class="btn btn-small">Scarica</a> ';
            html += '<button class="btn btn-small btn-danger" onclick="eliminaDocumento(' + doc.id + ')">Elimina</button>';
            html += '</td></tr>';
        }

        tbody.innerHTML = html;
    }

    // === ELIMINA DOCUMENTO ===
    async function eliminaDocumento(id) {
        if (!confirm('Eliminare questo documento?')) return;

        try {
            const { data: doc } = await supabase.from('documenti')
                .select('*')
                .eq('id', id)
                .single();

            if (doc) {
                await supabase.storage.from(CONFIG.BUCKET_NAME).remove([doc.nome_file]);
                await supabase.from('documenti').delete().eq('id', id);
            }

            mostraMessaggio('Documento eliminato.');
            caricaUtenti();
            // Ricarica la lista se visibile
            const sezione = document.getElementById('sezioneDocumentiUtente');
            if (sezione.style.display === 'block') {
                // Ricarica
                const nome = document.getElementById('titoloDocumentiUtente').textContent.replace('Documenti di ', '');
                // Non abbiamo l'id qui, ricarichiamo tutto
                caricaUtenti();
            }
        } catch (err) {
            mostraErrore('Errore durante l\'eliminazione.');
        }
    }

    function formattaDimensione(bytes) {
        if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
        if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return bytes + ' B';
    }

    // Avvio
    caricaUtenti();
    </script>
</body>
</html>
